name: Publish

# Fires only when a version tag is pushed (e.g. `git tag v0.1.1 && git push --tags`).
# Requires an NPM_TOKEN repository secret (Settings → Secrets → Actions) with
# publish rights to the @conciar scope. Until that secret exists this workflow is
# dormant — it never runs on normal pushes.
on:
  push:
    tags: ['v*']

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
      # Gate the publish on a green template build — never ship a broken template.
      - name: Verify template
        working-directory: template
        run: npm ci && npx vitest run && npm run build
      - name: Publish to npm
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
